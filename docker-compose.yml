services:
  dispatcher:
    profiles: ["llm"]
    image: ${JARVIS_VLLM_IMAGE:-vllm/vllm-openai:v0.23.0}
    container_name: jarvis-gpt-dispatcher
    restart: unless-stopped
    ipc: host
    command: >
      --model ${JARVIS_QWEN_MODEL_PATH:?set JARVIS_QWEN_MODEL_PATH via the Jarvis dispatcher manager}
      --served-model-name ${JARVIS_QWEN_MODEL_NAME:-dispatcher}
      --dtype ${JARVIS_QWEN_DTYPE:-auto}
      ${JARVIS_QWEN_QUANT_ARGS:-}
      ${JARVIS_QWEN_ENFORCE_EAGER:-}
      --max-model-len ${JARVIS_QWEN_MAX_LEN:-32768}
      --gpu-memory-utilization ${JARVIS_QWEN_GPU_UTIL:-0.82}
      --kv-cache-dtype ${JARVIS_QWEN_KV_DTYPE:-fp8}
      ${JARVIS_QWEN_CPU_OFFLOAD_ARGS:-}
      ${JARVIS_QWEN_KV_OFFLOAD_ARGS:-}
      --tokenizer-mode ${JARVIS_QWEN_TOKENIZER_MODE:-slow}
      --safetensors-load-strategy ${JARVIS_QWEN_SAFETENSORS_LOAD_STRATEGY:-prefetch}
      --enable-prefix-caching
      --max-num-seqs ${JARVIS_QWEN_MAX_NUM_SEQS:-16}
      ${JARVIS_QWEN_EXTRA_ARGS:-}
      --host 0.0.0.0
      --port 8001
    environment:
      HUGGING_FACE_HUB_TOKEN: ${HF_TOKEN:-}
      VLLM_USE_V2_MODEL_RUNNER: ${VLLM_USE_V2_MODEL_RUNNER:-0}
      VLLM_WEIGHT_OFFLOADING_DISABLE_UVA: ${VLLM_WEIGHT_OFFLOADING_DISABLE_UVA:-1}
      VLLM_WORKER_MULTIPROC_METHOD: spawn
      NVIDIA_VISIBLE_DEVICES: "0"
      CUDA_VISIBLE_DEVICES: ${CUDA_VISIBLE_DEVICES:-0}
      CUDA_DEVICE_ORDER: ${CUDA_DEVICE_ORDER:-PCI_BUS_ID}
      CUDA_DISABLE_P2P: ${CUDA_DISABLE_P2P:-1}
      NCCL_P2P_DISABLE: ${NCCL_P2P_DISABLE:-1}
      HF_HUB_OFFLINE: "1"
      TRANSFORMERS_OFFLINE: "1"
      HF_HUB_ENABLE_HF_TRANSFER: "0"
      HF_HUB_DOWNLOAD_TIMEOUT: "120"
    volumes:
      - type: bind
        source: ${JARVIS_MODEL_ROOT:-D:/jarvis/data/models}
        target: /models
        read_only: true
      - type: bind
        source: ${JARVIS_HOST_HOME:-D:/jarvis}/cache
        target: /root/.cache
    ports:
      - "127.0.0.1:8001:8001"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 20s
      timeout: 5s
      retries: 40
      start_period: 600s

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    init: true
    shm_size: 512m
    stop_grace_period: 30s
    read_only: true
    pids_limit: 512
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
      - SYS_CHROOT
    environment:
      JARVIS_HOME: /runtime
      JARVIS_MODEL_ROOT: /runtime/data/models
      JARVIS_PROFILE: ${JARVIS_PROFILE:-gemma4-turbo}
      JARVIS_LLM_BASE_URL: ${JARVIS_LLM_BASE_URL:-http://host.docker.internal:8001/v1}
      JARVIS_LLM_MODEL: ${JARVIS_LLM_MODEL:-dispatcher}
      JARVIS_LLM_ENABLED: ${JARVIS_LLM_ENABLED:-1}
      JARVIS_LLM_TIMEOUT_SEC: ${JARVIS_LLM_TIMEOUT_SEC:-240}
      JARVIS_LLM_MAX_TOKENS: ${JARVIS_LLM_MAX_TOKENS:-2048}
      JARVIS_VERIFY_ANSWERS: ${JARVIS_VERIFY_ANSWERS:-1}
      JARVIS_EMBEDDINGS_ENABLED: ${JARVIS_EMBEDDINGS_ENABLED:-0}
      JARVIS_EMBEDDINGS_BASE_URL: ${JARVIS_EMBEDDINGS_BASE_URL:-http://host.docker.internal:8001/v1}
      JARVIS_EMBEDDINGS_MODEL: ${JARVIS_EMBEDDINGS_MODEL:-}
      JARVIS_API_HOST: ${JARVIS_API_HOST:-0.0.0.0}
      JARVIS_API_PORT: ${JARVIS_API_PORT:-8000}
      JARVIS_API_TOKEN: ${JARVIS_API_TOKEN:?set JARVIS_API_TOKEN to a random 32+ character secret}
      JARVIS_TELEGRAM_BRIDGE_SECRET: ${JARVIS_TELEGRAM_BRIDGE_SECRET:-}
      JARVIS_TELEGRAM_REALM_ID: ${JARVIS_TELEGRAM_REALM_ID:-default}
      JARVIS_TELEGRAM_SESSION_TTL_SECONDS: ${JARVIS_TELEGRAM_SESSION_TTL_SECONDS:-900}
      JARVIS_API_REQUIRE_TOKEN_ON_LOOPBACK: ${JARVIS_API_REQUIRE_TOKEN_ON_LOOPBACK:-1}
      JARVIS_TELEGRAM_USER_RATE_LIMIT_PER_MINUTE: ${JARVIS_TELEGRAM_USER_RATE_LIMIT_PER_MINUTE:-30}
      JARVIS_TELEGRAM_GLOBAL_RATE_LIMIT_PER_MINUTE: ${JARVIS_TELEGRAM_GLOBAL_RATE_LIMIT_PER_MINUTE:-1200}
      JARVIS_API_USER_RATE_LIMIT_PER_MINUTE: ${JARVIS_API_USER_RATE_LIMIT_PER_MINUTE:-240}
      JARVIS_CORS_ORIGINS: ${JARVIS_CORS_ORIGINS:-}
      JARVIS_BRAVE_SEARCH_API_KEY: ${JARVIS_BRAVE_SEARCH_API_KEY:-}
      JARVIS_TAVILY_API_KEY: ${JARVIS_TAVILY_API_KEY:-}
      JARVIS_SERPER_API_KEY: ${JARVIS_SERPER_API_KEY:-}
      JARVIS_DEFAULT_CITY: ${JARVIS_DEFAULT_CITY:-}
      JARVIS_AUTONOMY_ENABLED: ${JARVIS_AUTONOMY_ENABLED:-1}
      JARVIS_TELEMETRY_INTERVAL_SEC: ${JARVIS_TELEMETRY_INTERVAL_SEC:-120}
      JARVIS_HEALTH_INTERVAL_SEC: ${JARVIS_HEALTH_INTERVAL_SEC:-300}
      JARVIS_LEARNING_INTERVAL_SEC: ${JARVIS_LEARNING_INTERVAL_SEC:-600}
      JARVIS_COGNITION_ENABLED: ${JARVIS_COGNITION_ENABLED:-1}
      JARVIS_COGNITION_INTERVAL_SEC: ${JARVIS_COGNITION_INTERVAL_SEC:-300}
      JARVIS_COGNITION_MAX_TOKENS: ${JARVIS_COGNITION_MAX_TOKENS:-512}
      JARVIS_AUTONOMY_MISSION_INTERVAL_SEC: ${JARVIS_AUTONOMY_MISSION_INTERVAL_SEC:-120}
    security_opt:
      - no-new-privileges:true
      - seccomp=./backend/chromium-seccomp.json
    tmpfs:
      - /tmp:rw,nosuid,nodev,size=512m
      - /home/jarvis:rw,nosuid,nodev,size=64m
    volumes:
      - type: bind
        source: ${JARVIS_HOST_HOME:-D:/jarvis}
        target: /runtime
    ports:
      - "${JARVIS_API_BIND_ADDRESS:-127.0.0.1}:${JARVIS_API_PORT:-8000}:${JARVIS_API_PORT:-8000}"

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    init: true
    read_only: true
    pids_limit: 256
    cap_drop:
      - ALL
    environment:
      JARVIS_BACKEND_URL: http://backend:8000
      JARVIS_API_TOKEN: ${JARVIS_API_TOKEN:?set JARVIS_API_TOKEN to a random 32+ character secret}
      JARVIS_UI_SESSION_SECRET: ${JARVIS_UI_SESSION_SECRET:-}
      JARVIS_TRUST_PROXY_HEADERS: ${JARVIS_TRUST_PROXY_HEADERS:-0}
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:rw,nosuid,nodev,size=64m
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      backend:
        condition: service_healthy
