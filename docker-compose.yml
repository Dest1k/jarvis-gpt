services:
  backend:
    build:
      context: ./backend
    environment:
      JARVIS_HOME: /runtime
      JARVIS_PROFILE: ${JARVIS_PROFILE:-gemma4-mono}
      JARVIS_LLM_BASE_URL: ${JARVIS_LLM_BASE_URL:-http://host.docker.internal:8001/v1}
      JARVIS_LLM_MODEL: ${JARVIS_LLM_MODEL:-gemma4-dispatcher}
      JARVIS_LLM_ENABLED: ${JARVIS_LLM_ENABLED:-1}
    volumes:
      - type: bind
        source: ${JARVIS_HOST_HOME:-D:/jarvis}
        target: /runtime
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
    environment:
      NEXT_PUBLIC_JARVIS_API_URL: ${NEXT_PUBLIC_JARVIS_API_URL:-http://localhost:8000}
    ports:
      - "3000:3000"
    depends_on:
      - backend
